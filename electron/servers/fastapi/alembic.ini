# Alembic configuration for CLI usage (e.g. alembic revision --autogenerate)
# migrations.py sets these programmatically when running at app startup.

[alembic]
script_location = %(here)s/alembic
# sqlalchemy.url is overridden by env.py (uses DATABASE_URL or APP_DATA_DIRECTORY)
sqlalchemy.url = sqlite:///placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
